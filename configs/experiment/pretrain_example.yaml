# @package _global_
# DELBERT MLM pretraining configuration.
#
# Usage:
#   python scripts/pretrain.py experiment=pretrain_example

experiment_name: pretrain_wdr91
seed: 42

pytorch:
  matmul_precision: medium
  enable_tf32: true

# Model architecture (paper: 640 hidden, 16 layers, 16 heads, ~70M params)
model:
  name: modernbert
  hidden_size: 640
  num_hidden_layers: 16
  num_attention_heads: 16
  intermediate_size: 1152
  max_position_embeddings: 1024
  global_rope_theta: 160000.0
  local_attention: 128
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  use_segment_embeddings: true
  segment_position_encoding: none

# Data configuration
data:
  processed_dir: ${hydra:runtime.cwd}/processed_data/pretrain/wdr91_pretrain
  task_type: pretrain
  mlm_probability: 0.15
  span_shuffle_probability: 0.3

# Training configuration
training:
  learning_rate: 5e-4
  warmup_ratio: 0.1
  weight_decay: 0.01
  gradient_clip_val: 1.0
  accumulate_grad_batches: 2

  num_epochs: 100
  val_check_interval: 1.0
  limit_val_batches: 1.0
  num_sanity_val_steps: 0
  log_every_n_steps: 100

  batch_size: 70
  num_workers: 4
  prefetch_factor: 16
  pin_memory: true
  persistent_workers: true

  devices: 4
  num_nodes: 1
  accelerator: gpu
  precision: bf16-mixed
  strategy: auto

# Resume from checkpoint (set to null to start fresh)
resume:
  checkpoint_path: null

# Checkpoint configuration
checkpoints:
  - monitor: val_loss
    mode: min
    save_top_k: 2
    save_last: false
    filename: "{epoch:02d}-{val_loss:.3f}"
    dirpath: checkpoints/best
    every_n_epochs: 1

  - monitor: null
    save_top_k: 0
    save_last: true
    filename: last
    dirpath: checkpoints

# Early stopping
early_stopping:
  enabled: false
  monitor: val_loss
  patience: 5
  mode: min
  min_delta: 0.01

# Weights & Biases
wandb:
  enabled: true
  offline: false
  project: delbert
  group: ${experiment_name}
  name: run_${now:%Y-%m-%d_%H-%M-%S}
  save_dir: wandb
  tags: []
