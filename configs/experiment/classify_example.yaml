# @package _global_
# DELBERT classification (finetuning) configuration.
#
# Supports two modes:
# 1. Finetuning: Set pretrained_checkpoint to path of MLM checkpoint
# 2. From scratch: Set pretrained_checkpoint to null
#
# Usage:
#   python scripts/train_classifier.py experiment=classify_example

defaults:
  - _self_

experiment_name: classify_wdr91
seed: 42

hydra:
  run:
    dir: outputs/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: true

# Path to pretrained MLM checkpoint (set to null for training from scratch)
pretrained_checkpoint: null  # e.g., outputs/pretrain_wdr91/.../checkpoints/best/epoch=XX-val_loss=X.XXX.ckpt

# Model configuration
model:
  num_labels: 2
  classifier_dropout: 0.1
  classifier_pooling: mean

  # Loss: 'ce', 'weighted_ce', or 'focal'
  loss_type: weighted_ce
  pos_class_weight: 15.0

  # Finetuning strategy: 'full', 'frozen', or 'lora'
  finetuning_strategy: lora

  # LoRA parameters (used when finetuning_strategy: lora)
  strategy_params:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.1
    target_modules: ['Wqkv']

  # Architecture (only used when pretrained_checkpoint is null)
  # When finetuning, architecture is loaded from the checkpoint
  # architecture:
  #   hidden_size: 640
  #   num_hidden_layers: 16
  #   num_attention_heads: 16
  #   intermediate_size: 1152
  #   max_position_embeddings: 1024
  #   global_rope_theta: 160000.0
  #   local_attention: 128
  #   hidden_dropout_prob: 0.1
  #   attention_probs_dropout_prob: 0.1

# Data paths (from prepare_supervised_data.py output)
data:
  train_dir: processed_data/supervised/wdr91_library_ood/train
  val_dir: processed_data/supervised/wdr91_library_ood/val
  tokenizer_dir: processed_data/supervised/wdr91_library_ood/tokenizer
  batch_size: 50
  num_workers: 4
  prefetch_factor: 16
  pin_memory: true
  persistent_workers: true

# Training configuration
train:
  resume_from_checkpoint: null
  num_epochs: 10
  learning_rate: 5e-4
  warmup_ratio: 0.1
  weight_decay: 0.01
  gradient_clip_val: 1.0
  gradient_accumulation_steps: 1

  devices: 4
  accelerator: gpu
  num_nodes: 1
  strategy: auto
  precision: bf16-mixed
  matmul_precision: medium
  enable_tf32: true

  checkpoint_dir: checkpoints
  save_top_k: 3
  save_last: true
  monitor: val_pr_auc
  mode: max

  log_every_n_steps: 10
  val_check_interval: 1.0
  limit_val_batches: 1.0
  num_sanity_val_steps: 0
  enable_checkpointing: true
  deterministic: false

  early_stopping:
    enabled: true
    monitor: val_pr_auc
    patience: 5
    mode: max
    min_delta: 0.001

# Weights & Biases
wandb:
  enabled: true
  offline: false
  entity: null
  project: delbert-finetune
  group: ${experiment_name}
  name: run_${now:%Y-%m-%d_%H-%M-%S}
  tags: []
